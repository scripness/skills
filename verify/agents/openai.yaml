display_name: Adversarial Verify
short_description: Adversarial review of a concrete plan, implementation, or claim
default_prompt: Use this skill when there is already a concrete plan, implementation, diff, or claim to judge. Verify it against repo truth and mechanical checks. If the next move is still unclear, use consult instead. If the task is to create or maintain durable task state, use plan instead. If the user wants implementation or fixes now, use execute instead.
