display_name: Adversarial Verify
short_description: Findings-first review of a concrete plan, implementation, or claim
default_prompt: Use this skill only when there is already a concrete plan, implementation slice, diff, or claim to judge. First identify whether the target is a plan, implementation, or claim review, then verify it against repo truth, required specs/tests sync, and the smallest meaningful mechanical checks. Report findings first, say when checks were blocked, and treat missing required specs/tests sync as a fail when the obligation is clear. If the next move is still unclear, use consult instead. If the task is to create or maintain durable task state, use plan instead. If the user wants implementation or fixes now, use execute instead.
