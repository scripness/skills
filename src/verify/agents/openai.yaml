display_name: Adversarial Verify
short_description: Findings-first review of a concrete plan, implementation, or claim
default_prompt: Use this skill only when there is already a concrete plan, implementation slice, diff, or claim to judge. First identify whether the target is a plan, implementation, or claim review, then verify it against repo truth, required specs/tests sync, and the smallest meaningful mechanical checks. Report findings first, say when checks were blocked, and treat missing required specs/tests sync as a fail when the obligation is clear. For plan reviews, also fail weak next-slice contracts that would force execute to guess, including missing slice-level specs/tests exit criteria when those obligations are material. When the verification target is an explicit plan file, update that same plan file with the review's task-local truth so it remains the canonical task record, reopening or appending one bounded follow-up slice when review disproves completion but the work remains repairable. For non-trivial reviews, prefer an independent verify pass when the provider supports it, but keep the main session responsible for the final findings and synthesize any independent result instead of blindly trusting it. If the next move is still unclear, use consult instead. If the task is to create or maintain durable task state, use plan instead. If the user wants implementation or fixes now, use execute instead.
