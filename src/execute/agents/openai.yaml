display_name: Bounded Execute
short_description: Implement one task or one plan slice
default_prompt: Use this skill to implement one bounded task directly or execute the next bounded slice from an explicit plan file, read the current plan context before choosing the slice, run mechanical checks, update the plan when the work is plan-driven, and hand off to verify. In plan-driven work, use the plan's slice-level specs/tests exit criteria when present, and bounce back to plan instead of guessing if the next slice is under-specified. Leave enough truthful plan state behind for later verify or the optional continuous helper to confirm, reopen, or continue the work safely.
